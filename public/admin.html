<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Dispatch Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #222;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
    }

    .title {
      font-size: 30px;
      font-weight: bold;
      margin-bottom: 16px;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    #map {
      height: 450px;
      width: 100%;
      border-radius: 14px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f1f1f1;
    }

    .status {
      font-weight: bold;
      padding: 6px 10px;
      border-radius: 999px;
      display: inline-block;
      font-size: 12px;
    }

    .red {
      background: #f8d7da;
      color: #842029;
    }

    .yellow {
      background: #fff3cd;
      color: #664d03;
    }

    .green {
      background: #d1e7dd;
      color: #0f5132;
    }

    .blue {
      background: #cfe2ff;
      color: #084298;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">Dispatch Dashboard</div>

    <div class="card">
      <div id="map"></div>
    </div>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Driver</th>
            <th>Current Stop</th>
            <th>Status</th>
            <th>Last GPS Update</th>
            <th>Route Stops</th>
          </tr>
        </thead>
        <tbody id="driverTable">
          <tr><td colspan="5">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const map = L.map("map").setView([39.9526, -75.1652], 11);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    let markers = {};

    function formatTime(isoString) {
      if (!isoString) return "Unknown";
      return new Date(isoString).toLocaleString();
    }

    function statusBadge(progress, hasGps) {
      if (!hasGps) {
        return '<span class="status blue">No GPS yet</span>';
      }

      if (!progress) {
        return '<span class="status red">Not started</span>';
      }

      if (progress.arrived) {
        return '<span class="status green">Arrived at stop</span>';
      }

      return '<span class="status yellow">En route</span>';
    }

    async function loadAdmin() {
      const res = await fetch("/admin-data");
      const data = await res.json();

      const table = document.getElementById("driverTable");
      table.innerHTML = "";

      data.drivers.forEach(driver => {
        if (driver.location) {
          const lat = driver.location.lat;
          const lon = driver.location.lon;

          if (markers[driver.driverId]) {
            markers[driver.driverId].setLatLng([lat, lon]);
          } else {
            markers[driver.driverId] = L.marker([lat, lon])
              .addTo(map)
              .bindPopup(driver.driverId);
          }
        }

        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${driver.driverId}</td>
          <td>${driver.progress ? driver.progress.currentStop : "Not started"}</td>
          <td>${statusBadge(driver.progress, !!driver.location)}</td>
          <td>${driver.location ? formatTime(driver.location.updatedAt) : "No GPS yet"}</td>
          <td>${driver.route.length}</td>
        `;
        table.appendChild(row);
      });
    }

    loadAdmin();
    setInterval(loadAdmin, 5000);
  </script>
</body>
</html>
