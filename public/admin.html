<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Dispatch Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #222;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
    }

    .title {
      font-size: 30px;
      font-weight: bold;
      margin-bottom: 16px;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    #map {
      height: 450px;
      width: 100%;
      border-radius: 14px;
      overflow: hidden;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f1f1f1;
    }

    tr.clickable {
      cursor: pointer;
    }

    tr.clickable:hover {
      background: #f8f9fa;
    }

    tr.selected {
      background: #eaf2ff;
    }

    .status {
      font-weight: bold;
      padding: 6px 10px;
      border-radius: 999px;
      display: inline-block;
      font-size: 12px;
    }

    .red {
      background: #f8d7da;
      color: #842029;
    }

    .yellow {
      background: #fff3cd;
      color: #664d03;
    }

    .green {
      background: #d1e7dd;
      color: #0f5132;
    }

    .blue {
      background: #cfe2ff;
      color: #084298;
    }

    .route-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .route-item {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
      background: #fff;
    }

    .route-item.active {
      border-color: #0b6efd;
      background: #eaf2ff;
    }

    .route-item.arrived {
      border-color: #198754;
      background: #e8f5ee;
    }

    .route-item.waiting {
      border-color: #ffc107;
      background: #fff8e1;
    }

    .small {
      color: #666;
      font-size: 13px;
      margin-top: 4px;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">Dispatch Dashboard</div>

    <div class="card">
      <div id="map"></div>
    </div>

    <div class="grid">
      <div class="card">
        <table>
          <thead>
            <tr>
              <th>Driver</th>
              <th>Current Stop</th>
              <th>Status</th>
              <th>Last GPS Update</th>
              <th>Route Stops</th>
            </tr>
          </thead>
          <tbody id="driverTable">
            <tr><td colspan="5">Loading...</td></tr>
          </tbody>
        </table>
      </div>

      <div class="card">
        <div class="route-title" id="routeTitle">Driver Route</div>
        <div id="routeDetail">Click a driver to view route details.</div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const map = L.map("map").setView([39.9526, -75.1652], 11);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    let markers = {};
    let currentData = [];
    let selectedDriverId = null;

    function formatTime(isoString) {
      if (!isoString) return "Unknown";
      return new Date(isoString).toLocaleString();
    }

    function statusBadge(progress, hasGps) {
      if (!hasGps) {
        return '<span class="status blue">No GPS yet</span>';
      }

      if (!progress) {
        return '<span class="status red">Not started</span>';
      }

      if (progress.arrived) {
        return '<span class="status green">Arrived at stop</span>';
      }

      return '<span class="status yellow">En route</span>';
    }

    function renderRoute(driver) {
      const routeTitle = document.getElementById("routeTitle");
      const routeDetail = document.getElementById("routeDetail");

      if (!driver) {
        routeTitle.innerText = "Driver Route";
        routeDetail.innerHTML = "Click a driver to view route details.";
        return;
      }

      routeTitle.innerText = `Route for ${driver.driverId}`;
      routeDetail.innerHTML = "";

      driver.route.forEach(stop => {
        const div = document.createElement("div");
        div.className = "route-item";

        const isActive =
          driver.progress &&
          Number(driver.progress.currentStop) === Number(stop.stopNumber);

        const isArrived =
          driver.progress &&
          driver.progress.arrived === true &&
          Number(driver.progress.arrivedStop) === Number(stop.stopNumber);

        const isWaiting =
          driver.progress &&
          Number(stop.stopNumber) > Number(driver.progress.currentStop);

        if (isArrived) {
          div.classList.add("arrived");
        } else if (isActive) {
          div.classList.add("active");
        } else if (isWaiting) {
          div.classList.add("waiting");
        }

        div.innerHTML = `
          <div><strong>Stop ${stop.stopNumber}</strong></div>
          <div><strong>Precinct:</strong> ${stop.precinct}</div>
          <div><strong>Location:</strong> ${stop.placeName}</div>
          <div><strong>Address:</strong> ${stop.streetAddress}</div>
        `;

        routeDetail.appendChild(div);
      });
    }

    function renderTable(drivers) {
      const table = document.getElementById("driverTable");
      table.innerHTML = "";

      drivers.forEach(driver => {
        const row = document.createElement("tr");
        row.className = "clickable";

        if (driver.driverId === selectedDriverId) {
          row.classList.add("selected");
        }

        row.innerHTML = `
          <td>${driver.driverId}</td>
          <td>${driver.progress ? driver.progress.currentStop : "Not started"}</td>
          <td>${statusBadge(driver.progress, !!driver.location)}</td>
          <td>${driver.location ? formatTime(driver.location.updatedAt) : "No GPS yet"}</td>
          <td>${driver.route.length}</td>
        `;

        row.addEventListener("click", () => {
          selectedDriverId = driver.driverId;
          renderTable(currentData);
          renderRoute(driver);

          if (driver.location) {
            map.setView([driver.location.lat, driver.location.lon], 14);
            if (markers[driver.driverId]) {
              markers[driver.driverId].openPopup();
            }
          }
        });

        table.appendChild(row);
      });
    }

    async function loadAdmin() {
      const res = await fetch("/admin-data");
      const data = await res.json();
      currentData = data.drivers;

      currentData.forEach(driver => {
        if (driver.location) {
          const lat = driver.location.lat;
          const lon = driver.location.lon;

          if (markers[driver.driverId]) {
            markers[driver.driverId].setLatLng([lat, lon]);
          } else {
            markers[driver.driverId] = L.marker([lat, lon])
              .addTo(map)
              .bindPopup(driver.driverId);
          }
        }
      });

      renderTable(currentData);

      if (selectedDriverId) {
        const selectedDriver = currentData.find(d => d.driverId === selectedDriverId);
        renderRoute(selectedDriver || null);
      }
    }

    loadAdmin();
    setInterval(loadAdmin, 5000);
  </script>
</body>
</html>
