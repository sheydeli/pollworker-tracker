<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Pollworker Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      max-width: 400px;
      margin: auto;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }
    #error {
      color: red;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <h2>Pollworker Login</h2>

  <input id="username" placeholder="Username" />
  <input id="password" placeholder="Precinct Number" type="password" />

  <button onclick="login()">Login</button>

  <div id="error"></div>

  <script>
    async function login() {
      const username = document.getElementById("username").value.trim();
      const precinct = document.getElementById("password").value.trim();
      const error = document.getElementById("error");

      error.innerText = "";

      if (username !== "pollworker") {
        error.innerText = "Invalid username";
        return;
      }

      if (!precinct) {
        error.innerText = "Enter precinct number";
        return;
      }

      try {
        const res = await fetch(`/assignment/${encodeURIComponent(precinct)}`);

        if (!res.ok) {
          error.innerText = "Invalid precinct";
          return;
        }

        window.location.href = `/precinct.html?precinct=${encodeURIComponent(precinct)}`;
      } catch (err) {
        error.innerText = "Error connecting";
      }
    }
  </script>
</body>
</html>
