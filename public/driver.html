<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Driver Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f7f7f7;
      color: #222;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
      padding: 20px;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 26px;
      text-align: center;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    label {
      display: block;
      font-weight: bold;
      margin-top: 10px;
      margin-bottom: 6px;
    }

    input, button {
      width: 100%;
      box-sizing: border-box;
      font-size: 18px;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .primary {
      background: #0b6efd;
      color: white;
    }

    .danger {
      background: #dc3545;
      color: white;
    }

    .secondary {
      background: #6c757d;
      color: white;
    }

    .success {
      background: #198754;
      color: white;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .row button {
      width: 50%;
    }

    .status-box {
      background: #fff;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      white-space: pre-line;
      line-height: 1.5;
      font-size: 15px;
    }

    .small {
      font-size: 14px;
      color: #666;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Driver Tracker</h2>

    <div class="card">
      <label for="id">Driver Name</label>
      <input id="id" placeholder="Driver Name" />

      <label for="stop">Current Stop Number</label>
      <input id="stop" placeholder="Stop Number" type="number" min="1" />

      <div class="row">
        <button class="primary" onclick="startTracking()">Start GPS</button>
        <button class="danger" onclick="stopTracking()">Stop GPS</button>
      </div>

      <div class="row">
        <button class="secondary" onclick="updateStop()">Update Stop</button>
        <button class="success" onclick="nextStop()">Next Stop</button>
      </div>

      <div class="small">
        Tip: open this page from a direct link like:<br>
        <strong>/driver.html?id=Nadirah%20Muhammad</strong>
      </div>
    </div>

    <div id="status" class="status-box">Waiting to start...</div>
  </div>

  <script>
    let watchId = null;

    function setStatus(message) {
      document.getElementById("status").innerText = message;
    }

    async function sendLocation(id, lat, lon) {
      const res = await fetch("/update-location", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          id,
          lat,
          lon
        })
      });

      return res.json();
    }

    async function sendStop(driverId, stop) {
      const res = await fetch("/update-driver-stop", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          driverId,
          currentStop: Number(stop)
        })
      });

      return res.json();
    }

    function getDriverName() {
      return document.getElementById("id").value.trim();
    }

    function getStopNumber() {
      return Number(document.getElementById("stop").value);
    }

    async function updateStop() {
      const driverName = getDriverName();
      const stopNumber = getStopNumber();

      if (!driverName) {
        setStatus("Please enter a driver name.");
        return;
      }

      if (!stopNumber) {
        setStatus("Please enter a stop number.");
        return;
      }

      try {
        await sendStop(driverName, stopNumber);
        setStatus(
          `Driver: ${driverName}
Current Stop: ${stopNumber}
Stop updated successfully.`
        );
      } catch (err) {
        setStatus("Error updating stop.");
      }
    }

    async function nextStop() {
      const stopInput = document.getElementById("stop");
      let current = Number(stopInput.value || 0);
      current += 1;
      stopInput.value = current;
      await updateStop();
    }

    function startTracking() {
      const driverName = getDriverName();

      if (!driverName) {
        setStatus("Please enter a driver name.");
        return;
      }

      if (!navigator.geolocation) {
        setStatus("Geolocation is not supported on this device.");
        return;
      }

      setStatus(`Starting GPS for ${driverName}...`);

      watchId = navigator.geolocation.watchPosition(
        async (position) => {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;
          const stopNumber = document.getElementById("stop").value || "Not set";

          try {
            await sendLocation(driverName, lat, lon);

            setStatus(
              `Tracking Active

Driver: ${driverName}
Current Stop: ${stopNumber}
Latitude: ${lat}
Longitude: ${lon}
Updated: ${new Date().toLocaleTimeString()}`
            );
          } catch (err) {
            setStatus("Error sending GPS location.");
          }
        },
        (error) => {
          setStatus(`GPS error: ${error.message}`);
        },
        {
          enableHighAccuracy: true,
          maximumAge: 5000,
          timeout: 10000
        }
      );
    }

    function stopTracking() {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }

      setStatus("GPS tracking stopped.");
    }

    const params = new URLSearchParams(window.location.search);
    const driverNameFromUrl = params.get("id");

    if (driverNameFromUrl) {
      document.getElementById("id").value = driverNameFromUrl;
      setStatus(`Driver loaded from link: ${driverNameFromUrl}`);
    }
  </script>
</body>
</html>
