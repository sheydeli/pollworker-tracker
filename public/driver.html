<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Driver Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <h2>Driver Tracker</h2>

  <select id="driverSelect"></select>
  <button onclick="loadMyRoute()">Load My Route</button>
  <button onclick="resetDriver()">Reset Route</button>

  <div id="status"></div>
  <div id="route"></div>

<script>
let currentStop = null;

function getDriverName() {
  return document.getElementById("driverSelect").value;
}

async function loadDrivers() {
  const res = await fetch("/drivers");
  const drivers = await res.json();

  const select = document.getElementById("driverSelect");
  select.innerHTML = drivers.map(d => `<option value="${d}">${d}</option>`).join("");
}

async function loadMyRoute() {
  const driver = getDriverName();
  const res = await fetch(`/driver-route/${driver}`);
  const data = await res.json();

  currentStop = data.progress.currentStop;

  const routeHTML = data.route.map(stop => `
    <div>
      Stop ${stop.stopNumber} - ${stop.placeName}
      <button onclick="selectStop(${stop.stopNumber})">Start</button>
    </div>
  `).join("");

  document.getElementById("route").innerHTML = routeHTML;

  startTracking();
}

async function selectStop(stop) {
  const driver = getDriverName();

  await fetch("/update-driver-stop", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ driverId: driver, currentStop: stop })
  });

  loadMyRoute();
}

async function resetDriver() {
  const driver = getDriverName();

  await fetch("/reset-driver", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ driverId: driver })
  });

  loadMyRoute();
}

function startTracking() {
  const driver = getDriverName();

  navigator.geolocation.watchPosition(async pos => {
    await fetch("/update-location", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        id: driver,
        lat: pos.coords.latitude,
        lon: pos.coords.longitude
      })
    });
  });
}

loadDrivers();
</script>
</body>
</html>
