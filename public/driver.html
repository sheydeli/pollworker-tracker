<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Driver Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f7f7f7;
      color: #222;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 16px;
    }

    h2 {
      margin: 0 0 16px 0;
      font-size: 28px;
      text-align: center;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    label {
      display: block;
      font-weight: bold;
      margin-top: 10px;
      margin-bottom: 6px;
    }

    select, button {
      width: 100%;
      box-sizing: border-box;
      font-size: 18px;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-top: 10px;
    }

    button {
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .primary {
      background: #0b6efd;
      color: white;
    }

    .success {
      background: #198754;
      color: white;
    }

    .warning {
      background: #ffc107;
      color: #222;
    }

    .status-box {
      background: #fff;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      white-space: pre-line;
      line-height: 1.5;
      font-size: 15px;
    }

    .route-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .route-item {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
      background: #fff;
    }

    .route-item.active {
      border-color: #0b6efd;
      background: #eaf2ff;
    }

    .route-item.arrived {
      border-color: #198754;
      background: #e8f5ee;
    }

    .current-stop-box {
      font-size: 20px;
      font-weight: bold;
      padding: 14px;
      border-radius: 10px;
      background: #f1f1f1;
      margin-top: 12px;
      text-align: center;
    }

    .hidden {
      display: none;
    }

    .small {
      color: #666;
      font-size: 14px;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Driver Tracker</h2>

    <div class="card">
      <label for="driverSelect">Select Your Name</label>
      <select id="driverSelect">
        <option value="">Loading drivers...</option>
      </select>

      <button class="primary" onclick="loadMyRoute()">Load My Route</button>

      <div id="driverControls" class="hidden">
        <div id="currentStopBox" class="current-stop-box">Current Stop: Not set</div>

        <button class="primary" onclick="startTracking()">Start GPS</button>
        <button class="warning" onclick="markArrived()">Arrived at This Stop</button>
        <button class="success" onclick="nextStop()">Next Stop</button>
      </div>

      <div class="small">
        Select your name, load your route, start GPS, then use Arrived / Next Stop.
      </div>
    </div>

    <div id="status" class="status-box">Loading driver list...</div>

    <div class="card">
      <div class="route-title">Assigned Route</div>
      <div id="routeList">No route loaded yet.</div>
    </div>
  </div>

  <script>
    let watchId = null;
    let loadedRoute = [];
    let currentStop = null;

    function setStatus(message) {
      document.getElementById("status").innerText = message;
    }

    function updateCurrentStopBox() {
      const box = document.getElementById("currentStopBox");
      if (currentStop) {
        box.innerText = `Current Stop: ${currentStop}`;
      } else {
        box.innerText = "Current Stop: Not set";
      }
    }

    async function loadDriverList() {
      try {
        const res = await fetch("/drivers");
        const drivers = await res.json();

        const select = document.getElementById("driverSelect");
        select.innerHTML = '<option value="">Select your name</option>';

        drivers.forEach(driver => {
          const option = document.createElement("option");
          option.value = driver;
          option.textContent = driver;
          select.appendChild(option);
        });

        setStatus("Select your name and tap 'Load My Route'.");
      } catch (err) {
        setStatus("Unable to load driver list.");
      }
    }

    function getDriverName() {
      return document.getElementById("driverSelect").value;
    }

    async function sendLocation(id, lat, lon) {
      const res = await fetch("/update-location", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ id, lat, lon })
      });
      return res.json();
    }

    async function sendStop(driverId, stop) {
      const res = await fetch("/update-driver-stop", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          driverId,
          currentStop: Number(stop)
        })
      });
      return res.json();
    }

    async function sendArrived(driverId, stop) {
      const res = await fetch("/driver-arrived", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          driverId,
          currentStop: Number(stop)
        })
      });
      return res.json();
    }

    async function loadMyRoute() {
      const driverName = getDriverName();
      const routeList = document.getElementById("routeList");
      const controls = document.getElementById("driverControls");

      if (!driverName) {
        setStatus("Please select your name.");
        return;
      }

      try {
        const res = await fetch(`/driver-route/${encodeURIComponent(driverName)}`);

        if (!res.ok) {
          routeList.innerHTML = "No route found for that driver.";
          setStatus("No route found.");
          controls.classList.add("hidden");
          return;
        }

        const data = await res.json();
        loadedRoute = data.route;
        const progress = data.progress;

        if (progress && progress.currentStop) {
          currentStop = Number(progress.currentStop);
        } else if (loadedRoute.length > 0) {
          currentStop = Number(loadedRoute[0].stopNumber);
          await sendStop(driverName, currentStop);
        }

        updateCurrentStopBox();
        renderRoute(progress);
        controls.classList.remove("hidden");

        setStatus(
          `Route loaded for ${driverName}
Total Stops: ${loadedRoute.length}`
        );
      } catch (err) {
        routeList.innerHTML = "Error loading route.";
        setStatus("Error loading route.");
      }
    }

    function renderRoute(progress) {
      const routeList = document.getElementById("routeList");
      routeList.innerHTML = "";

      loadedRoute.forEach(stop => {
        const div = document.createElement("div");
        div.className = "route-item";

        const isActive = currentStop && Number(stop.stopNumber) === Number(currentStop);
        const isArrived =
          progress &&
          progress.arrived === true &&
          Number(progress.arrivedStop) === Number(stop.stopNumber);

        if (isArrived) {
          div.classList.add("arrived");
        } else if (isActive) {
          div.classList.add("active");
        }

        const encodedAddress = encodeURIComponent(`${stop.streetAddress}, Philadelphia, PA`);

        div.innerHTML = `
          <div><strong>Stop ${stop.stopNumber}</strong></div>
          <div><strong>Precinct:</strong> ${stop.precinct}</div>
          <div><strong>Location:</strong> ${stop.placeName}</div>
          <div><strong>Address:</strong> ${stop.streetAddress}</div>
          <button class="primary" onclick="selectStop(${stop.stopNumber})">Start This Stop</button>
          <button class="success" onclick="navigateTo('${encodedAddress}')">Navigate</button>
        `;

        routeList.appendChild(div);
      });
    }

    async function selectStop(stopNumber) {
      const driverName = getDriverName();

      if (!driverName) {
        setStatus("Select your name first.");
        return;
      }

      currentStop = stopNumber;
      updateCurrentStopBox();

      try {
        await sendStop(driverName, currentStop);

        setStatus(
          `Driver: ${driverName}
Now working on Stop: ${currentStop}`
        );

        await loadMyRoute();
      } catch (err) {
        setStatus("Error selecting stop.");
      }
    }

    function navigateTo(encodedAddress) {
      const url = `https://www.google.com/maps/search/?api=1&query=${encodedAddress}`;
      window.open(url, "_blank");
    }

    function startTracking() {
      const driverName = getDriverName();

      if (!driverName) {
        setStatus("Please select your name.");
        return;
      }

      if (!navigator.geolocation) {
        setStatus("Geolocation is not supported on this device.");
        return;
      }

      setStatus(`Starting GPS for ${driverName}...`);

      watchId = navigator.geolocation.watchPosition(
        async (position) => {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;

          try {
            await sendLocation(driverName, lat, lon);

            setStatus(
              `Tracking Active

Driver: ${driverName}
Current Stop: ${currentStop || "Not set"}
Latitude: ${lat}
Longitude: ${lon}
Updated: ${new Date().toLocaleTimeString()}`
            );
          } catch (err) {
            setStatus("Error sending GPS location.");
          }
        },
        (error) => {
          setStatus(`GPS error: ${error.message}`);
        },
        {
          enableHighAccuracy: true,
          maximumAge: 5000,
          timeout: 10000
        }
      );
    }

    async function markArrived() {
      const driverName = getDriverName();

      if (!driverName || !currentStop) {
        setStatus("Load your route first.");
        return;
      }

      try {
        await sendArrived(driverName, currentStop);
        setStatus(
          `Driver: ${driverName}
Current Stop: ${currentStop}
Status: ARRIVED`
        );
        await loadMyRoute();
      } catch (err) {
        setStatus("Error recording arrival.");
      }
    }

    async function nextStop() {
      const driverName = getDriverName();

      if (!driverName || !currentStop) {
        setStatus("Load your route first.");
        return;
      }

      const stopNumbers = loadedRoute.map(r => Number(r.stopNumber)).sort((a, b) => a - b);
      const currentIndex = stopNumbers.indexOf(Number(currentStop));

      if (currentIndex === -1) {
        setStatus("Current stop not found in route.");
        return;
      }

      if (currentIndex === stopNumbers.length - 1) {
        setStatus("You are already at the last stop.");
        return;
      }

      currentStop = stopNumbers[currentIndex + 1];
      updateCurrentStopBox();

      try {
        await sendStop(driverName, currentStop);
        setStatus(
          `Driver: ${driverName}
Moved to Stop: ${currentStop}`
        );
        await loadMyRoute();
      } catch (err) {
        setStatus("Error moving to next stop.");
      }
    }

    loadDriverList();
  </script>
</body>
</html>
