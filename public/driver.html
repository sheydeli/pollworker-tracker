<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Driver Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f7f7f7;
      color: #222;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 16px;
    }

    h2 {
      margin: 0 0 16px 0;
      font-size: 28px;
      text-align: center;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    select, button {
      width: 100%;
      box-sizing: border-box;
      font-size: 18px;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-top: 10px;
    }

    button {
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .primary {
      background: #0b6efd;
      color: white;
    }

    .success {
      background: #198754;
      color: white;
    }

    .secondary {
      background: #6c757d;
      color: white;
    }

    .status-box {
      background: white;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
      white-space: pre-line;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .section-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .route-item {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
      background: white;
    }

    .route-item.current {
      border-color: #0b6efd;
      background: #eaf2ff;
    }

    .route-item.finished {
      border-color: #198754;
      background: #e8f5ee;
    }

    .button-row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .button-row button {
      width: 50%;
      margin-top: 0;
    }

    .empty {
      color: #666;
      font-style: italic;
    }

    .current-stop-box {
      font-size: 20px;
      font-weight: bold;
      padding: 14px;
      border-radius: 10px;
      background: #f1f1f1;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Driver Tracker</h2>

    <div class="card">
      <select id="driverSelect">
        <option value="">Loading drivers...</option>
      </select>

      <button class="primary" onclick="loadMyRoute()">Load My Route</button>
      <button class="secondary" onclick="resetDriver()">Reset Route</button>

      <div id="currentStopBox" class="current-stop-box">Current Stop: Not set</div>
    </div>

    <div id="status" class="status-box">Loading driver list...</div>

    <div class="card">
      <div class="section-title">Current Stop</div>
      <div id="currentStopSection" class="empty">No current stop selected yet.</div>
    </div>

    <div class="card">
      <div class="section-title">To Do Stops</div>
      <div id="todoSection">No route loaded yet.</div>
    </div>

    <div class="card">
      <div class="section-title">Finished Stops</div>
      <div id="finishedSection" class="empty">No finished stops yet.</div>
    </div>
  </div>

  <script>
    let watchId = null;
    let loadedRoute = [];
    let currentStop = null;
    let completedStops = [];
    let reopenedStops = [];

    function setStatus(message) {
      document.getElementById("status").innerText = message;
    }

    function getDriverName() {
      return document.getElementById("driverSelect").value;
    }

    function updateCurrentStopBox() {
      document.getElementById("currentStopBox").innerText =
        currentStop ? `Current Stop: ${currentStop}` : "Current Stop: Not set";
    }

    async function loadDrivers() {
      const res = await fetch("/drivers");
      const drivers = await res.json();

      const select = document.getElementById("driverSelect");
      select.innerHTML = '<option value="">Select your name</option>';

      drivers.forEach(driver => {
        const option = document.createElement("option");
        option.value = driver;
        option.textContent = driver;
        select.appendChild(option);
      });

      setStatus("Select your name and tap Load My Route.");
    }

    async function sendStop(driverId, stop) {
      await fetch("/update-driver-stop", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ driverId, currentStop: Number(stop) })
      });
    }

    async function sendLocation(driverId, lat, lon) {
      await fetch("/update-location", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ id: driverId, lat, lon })
      });
    }

    async function loadMyRoute() {
      const driverName = getDriverName();

      if (!driverName) {
        setStatus("Select your name first.");
        return;
      }

      const res = await fetch(`/driver-route/${encodeURIComponent(driverName)}`);
      const data = await res.json();

      loadedRoute = data.route;
      currentStop = data.progress.currentStop ? Number(data.progress.currentStop) : null;
      completedStops = Array.isArray(data.progress.completedStops) ? data.progress.completedStops.map(Number) : [];
      reopenedStops = Array.isArray(data.progress.reopenedStops) ? data.progress.reopenedStops.map(Number) : [];

      updateCurrentStopBox();
      renderRoute();
      startTracking();

      setStatus(
        `Tracking Active

Driver: ${driverName}
Current Stop: ${currentStop || "Not selected yet"}`
      );
    }

    function makeStopCard(stop, cssClass, showActions, showReopen) {
      const div = document.createElement("div");
      div.className = `route-item ${cssClass || ""}`;

      const encodedAddress = encodeURIComponent(`${stop.streetAddress}, Philadelphia, PA`);

      div.innerHTML = `
        <div><strong>Stop ${stop.stopNumber}</strong></div>
        <div><strong>Precinct:</strong> ${stop.precinct}</div>
        <div><strong>Location:</strong> ${stop.placeName}</div>
        <div><strong>Address:</strong> ${stop.streetAddress}</div>
      `;

      if (showActions) {
        div.innerHTML += `
          <div class="button-row">
            <button class="primary" onclick="selectStop(${stop.stopNumber})">Start This Stop</button>
            <button class="success" onclick="navigateTo('${encodedAddress}')">Navigate</button>
          </div>
        `;
      }

      if (showReopen) {
        div.innerHTML += `
          <button class="secondary" onclick="reopenStop(${stop.stopNumber})">Reopen Stop</button>
        `;
      }

      return div;
    }

    function renderRoute() {
      const currentSection = document.getElementById("currentStopSection");
      const todoSection = document.getElementById("todoSection");
      const finishedSection = document.getElementById("finishedSection");

      currentSection.innerHTML = "";
      todoSection.innerHTML = "";
      finishedSection.innerHTML = "";

      const currentItem = loadedRoute.find(s => Number(s.stopNumber) === Number(currentStop));

      const finishedItems = loadedRoute.filter(s =>
        completedStops.includes(Number(s.stopNumber))
      );

      const todoItemsNormal = loadedRoute.filter(s =>
        Number(s.stopNumber) !== Number(currentStop) &&
        !completedStops.includes(Number(s.stopNumber)) &&
        !reopenedStops.includes(Number(s.stopNumber))
      );

      const todoItemsReopened = reopenedStops
        .map(stopNumber => loadedRoute.find(s => Number(s.stopNumber) === Number(stopNumber)))
        .filter(Boolean);

      const todoItems = [...todoItemsNormal, ...todoItemsReopened];

      if (currentItem) {
        currentSection.appendChild(makeStopCard(currentItem, "current", true, false));
      } else {
        currentSection.innerHTML = `<div class="empty">No current stop selected yet.</div>`;
      }

      if (todoItems.length) {
        todoItems.forEach(stop => {
          todoSection.appendChild(makeStopCard(stop, "", true, false));
        });
      } else {
        todoSection.innerHTML = `<div class="empty">No remaining stops.</div>`;
      }

      if (finishedItems.length) {
        finishedItems.forEach(stop => {
          finishedSection.appendChild(makeStopCard(stop, "finished", false, true));
        });
      } else {
        finishedSection.innerHTML = `<div class="empty">No finished stops yet.</div>`;
      }
    }

    async function selectStop(stopNumber) {
      const driverName = getDriverName();

      currentStop = Number(stopNumber);
      updateCurrentStopBox();

      await sendStop(driverName, currentStop);
      await loadMyRoute();

      setStatus(
        `Tracking Active

Driver: ${driverName}
Now heading to Stop: ${currentStop}`
      );
    }

    async function reopenStop(stopNumber) {
      const driverName = getDriverName();

      await fetch("/reopen-stop", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ driverId: driverName, stopNumber: Number(stopNumber) })
      });

      await loadMyRoute();
      setStatus(`Stop ${stopNumber} moved back to the end of To Do.`);
    }

    async function resetDriver() {
      const driverName = getDriverName();

      if (!driverName) {
        setStatus("Select your name first.");
        return;
      }

      const confirmReset = confirm("Reset your entire route?");
      if (!confirmReset) return;

      await fetch("/reset-driver", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ driverId: driverName })
      });

      await loadMyRoute();
      setStatus("Route reset.");
    }

    function navigateTo(encodedAddress) {
      window.open(`https://www.google.com/maps/search/?api=1&query=${encodedAddress}`, "_blank");
    }

    function startTracking() {
      const driverName = getDriverName();

      if (watchId !== null) return;

      if (!navigator.geolocation) {
        setStatus("GPS not supported.");
        return;
      }

      watchId = navigator.geolocation.watchPosition(
        async position => {
          await sendLocation(
            driverName,
            position.coords.latitude,
            position.coords.longitude
          );
        },
        error => {
          setStatus("GPS error: " + error.message);
        },
        {
          enableHighAccuracy: true,
          maximumAge: 5000,
          timeout: 10000
        }
      );
    }

    loadDrivers();
  </script>
</body>
</html>
