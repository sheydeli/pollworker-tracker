<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Driver Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f7f7f7;
      color: #222;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 16px;
    }

    h2 {
      margin: 0 0 16px 0;
      font-size: 28px;
      text-align: center;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    label {
      display: block;
      font-weight: bold;
      margin-top: 10px;
      margin-bottom: 6px;
    }

    input, button {
      width: 100%;
      box-sizing: border-box;
      font-size: 18px;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .primary {
      background: #0b6efd;
      color: white;
    }

    .danger {
      background: #dc3545;
      color: white;
    }

    .secondary {
      background: #6c757d;
      color: white;
    }

    .success {
      background: #198754;
      color: white;
    }

    .warning {
      background: #ffc107;
      color: #222;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .row button {
      width: 50%;
    }

    .status-box {
      background: #fff;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      white-space: pre-line;
      line-height: 1.5;
      font-size: 15px;
    }

    .route-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .route-item {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
      background: #fff;
    }

    .route-item.active {
      border-color: #0b6efd;
      background: #eaf2ff;
    }

    .route-item.arrived {
      border-color: #198754;
      background: #e8f5ee;
    }

    .route-item button {
      margin-top: 10px;
      font-size: 15px;
      padding: 10px;
    }

    .small {
      color: #666;
      font-size: 14px;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Driver Tracker</h2>

    <div class="card">
      <label for="id">Driver Name</label>
      <input id="id" placeholder="Driver Name" />

      <label for="stop">Current Stop Number</label>
      <input id="stop" placeholder="Stop Number" type="number" min="1" />

      <div class="row">
        <button class="primary" onclick="startTracking()">Start GPS</button>
        <button class="danger" onclick="stopTracking()">Stop GPS</button>
      </div>

      <div class="row">
        <button class="secondary" onclick="updateStop()">Update Stop</button>
        <button class="success" onclick="nextStop()">Next Stop</button>
      </div>

      <div class="row">
        <button class="warning" onclick="markArrived()">Arrived</button>
        <button class="secondary" onclick="markLeft()">Left Stop</button>
      </div>

      <div class="small">
        Example link:<br>
        <strong>/driver.html?id=Nadirah%20Muhammad</strong>
      </div>
    </div>

    <div id="status" class="status-box">Waiting to start...</div>

    <div class="card">
      <div class="route-title">Assigned Route</div>
      <div id="routeList">Loading route...</div>
    </div>
  </div>

  <script>
    let watchId = null;

    function setStatus(message) {
      document.getElementById("status").innerText = message;
    }

    async function sendLocation(id, lat, lon) {
      const res = await fetch("/update-location", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ id, lat, lon })
      });
      return res.json();
    }

    async function sendStop(driverId, stop) {
      const res = await fetch("/update-driver-stop", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          driverId,
          currentStop: Number(stop)
        })
      });
      return res.json();
    }

    async function sendArrived(driverId, stop) {
      const res = await fetch("/driver-arrived", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          driverId,
          currentStop: Number(stop)
        })
      });
      return res.json();
    }

    async function sendLeft(driverId) {
      const res = await fetch("/driver-left-stop", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ driverId })
      });
      return res.json();
    }

    function getDriverName() {
      return document.getElementById("id").value.trim();
    }

    function getStopNumber() {
      return Number(document.getElementById("stop").value);
    }

    async function updateStop() {
      const driverName = getDriverName();
      const stopNumber = getStopNumber();

      if (!driverName) {
        setStatus("Please enter a driver name.");
        return;
      }

      if (!stopNumber) {
        setStatus("Please enter a stop number.");
        return;
      }

      try {
        await sendStop(driverName, stopNumber);
        setStatus(
          `Driver: ${driverName}
Current Stop: ${stopNumber}
Stop updated successfully.`
        );
        loadRoute();
      } catch (err) {
        setStatus("Error updating stop.");
      }
    }

    async function nextStop() {
      const stopInput = document.getElementById("stop");
      let current = Number(stopInput.value || 0);
      current += 1;
      stopInput.value = current;
      await updateStop();
    }

    async function markArrived() {
      const driverName = getDriverName();
      const stopNumber = getStopNumber();

      if (!driverName || !stopNumber) {
        setStatus("Enter driver name and stop number first.");
        return;
      }

      try {
        await sendArrived(driverName, stopNumber);
        setStatus(
          `Driver: ${driverName}
Current Stop: ${stopNumber}
Status: ARRIVED`
        );
        loadRoute();
      } catch (err) {
        setStatus("Error recording arrival.");
      }
    }

    async function markLeft() {
      const driverName = getDriverName();

      if (!driverName) {
        setStatus("Enter driver name first.");
        return;
      }

      try {
        await sendLeft(driverName);
        setStatus(
          `Driver: ${driverName}
Status: LEFT STOP`
        );
        loadRoute();
      } catch (err) {
        setStatus("Error recording departure.");
      }
    }

    function selectStop(stopNumber) {
      document.getElementById("stop").value = stopNumber;
      updateStop();
    }

    async function loadRoute() {
      const driverName = getDriverName();
      const routeList = document.getElementById("routeList");

      if (!driverName) {
        routeList.innerHTML = "Enter a driver name to load the route.";
        return;
      }

      try {
        const res = await fetch(`/driver-route/${encodeURIComponent(driverName)}`);

        if (!res.ok) {
          routeList.innerHTML = "No route found for this driver.";
          return;
        }

        const data = await res.json();
        const route = data.route;
        const progress = data.progress;

        routeList.innerHTML = "";

        route.forEach(stop => {
          const div = document.createElement("div");
          div.className = "route-item";

          const isActive =
            progress &&
            Number(progress.currentStop) === Number(stop.stopNumber);

          const isArrived =
            progress &&
            progress.arrived === true &&
            Number(progress.arrivedStop) === Number(stop.stopNumber);

          if (isArrived) {
            div.classList.add("arrived");
          } else if (isActive) {
            div.classList.add("active");
          }

          div.innerHTML = `
            <div><strong>Stop ${stop.stopNumber}</strong></div>
            <div><strong>Precinct:</strong> ${stop.precinct}</div>
            <div><strong>Location:</strong> ${stop.placeName}</div>
            <div><strong>Address:</strong> ${stop.streetAddress}</div>
            <button class="primary" onclick="jumpToStop(${stop.stopNumber})">Go To This Stop</button>
          `;

          routeList.appendChild(div);
        });
      } catch (err) {
        routeList.innerHTML = "Error loading route.";
      }
    }

    function jumpToStop(stopNumber) {
      document.getElementById("stop").value = stopNumber;
      updateStop();
    }

    function startTracking() {
      const driverName = getDriverName();

      if (!driverName) {
        setStatus("Please enter a driver name.");
        return;
      }

      if (!navigator.geolocation) {
        setStatus("Geolocation is not supported on this device.");
        return;
      }

      setStatus(`Starting GPS for ${driverName}...`);

      watchId = navigator.geolocation.watchPosition(
        async (position) => {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;
          const stopNumber = document.getElementById("stop").value || "Not set";

          try {
            await sendLocation(driverName, lat, lon);

            setStatus(
              `Tracking Active

Driver: ${driverName}
Current Stop: ${stopNumber}
Latitude: ${lat}
Longitude: ${lon}
Updated: ${new Date().toLocaleTimeString()}`
            );
          } catch (err) {
            setStatus("Error sending GPS location.");
          }
        },
        (error) => {
          setStatus(`GPS error: ${error.message}`);
        },
        {
          enableHighAccuracy: true,
          maximumAge: 5000,
          timeout: 10000
        }
      );
    }

    function stopTracking() {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }

      setStatus("GPS tracking stopped.");
    }

    const params = new URLSearchParams(window.location.search);
    const driverNameFromUrl = params.get("id");

    if (driverNameFromUrl) {
      document.getElementById("id").value = driverNameFromUrl;
      setStatus(`Driver loaded from link: ${driverNameFromUrl}`);
      loadRoute();
    }
  </script>
</body>
</html>
