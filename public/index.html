<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Dispatch Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; }
    h1 { padding: 16px; margin: 0; }
    #map { height: 420px; margin: 16px; border-radius: 10px; }
    table { width: calc(100% - 32px); margin: 16px; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
    th, td { padding: 14px; border-bottom: 1px solid #eee; text-align: left; vertical-align: middle; }
    th { background: #eee; }
    .driver-name { display: flex; align-items: center; gap: 10px; }
    .driver-symbol { width: 20px; height: 20px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 4px rgba(0,0,0,0.5); }
    .marker { width: 30px; height: 30px; border-radius: 50%; border: 3px solid white; box-shadow: 0 0 6px rgba(0,0,0,0.6); }
    .active { color: green; font-weight: bold; }
    .inactive { color: red; font-weight: bold; }
  </style>
</head>
<body>

<h1>Dispatch Dashboard</h1>

<div id="map"></div>

<table>
  <thead>
    <tr>
      <th>Driver</th>
      <th>Current Location</th>
      <th>Status</th>
      <th>Last GPS</th>
      <th>Location Progress</th>
      <th>Precinct Progress</th>
    </tr>
  </thead>
  <tbody id="tableBody">
    <tr><td colspan="6">Loading...</td></tr>
  </tbody>
</table>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map("map").setView([39.9526, -75.1652], 11);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "&copy; OpenStreetMap contributors"
}).addTo(map);

let markers = {};

const colors = [
  "#0d6efd", "#198754", "#dc3545", "#fd7e14", "#6f42c1",
  "#20c997", "#d63384", "#ffc107", "#0dcaf0", "#6610f2"
];

function getColor(i) {
  return colors[i % colors.length];
}

function createIcon(color) {
  return L.divIcon({
    html: `<div class="marker" style="background:${color};"></div>`,
    className: "",
    iconSize: [30, 30],
    iconAnchor: [15, 15]
  });
}

function keyForStop(stop) {
  if (stop.lat !== undefined && stop.lon !== undefined) {
    return `${Number(stop.lat).toFixed(5)},${Number(stop.lon).toFixed(5)}`;
  }
  return `${stop.placeName}|${stop.streetAddress}`;
}

function groupRoute(route) {
  const map = {};

  route.forEach(stop => {
    const key = keyForStop(stop);

    if (!map[key]) {
      map[key] = {
        key,
        placeName: stop.placeName,
        streetAddress: stop.streetAddress,
        firstStopNumber: Number(stop.stopNumber),
        stops: [],
        precincts: []
      };
    }

    map[key].stops.push(stop);
    map[key].precincts.push(stop.precinct);
    map[key].firstStopNumber = Math.min(map[key].firstStopNumber, Number(stop.stopNumber));
  });

  return Object.values(map).sort((a, b) => a.firstStopNumber - b.firstStopNumber);
}

function getCompletedPrecinctCount(progress) {
  if (!progress || !Array.isArray(progress.completedStops)) return 0;
  return progress.completedStops.length;
}

function getCompletedLocationCount(route, progress) {
  const groups = groupRoute(route);
  const completedStops = progress?.completedStops || [];

  return groups.filter(group =>
    group.stops.every(stop => completedStops.includes(Number(stop.stopNumber)))
  ).length;
}

function getCurrentLocationText(route, progress) {
  if (!progress || !progress.currentStop) return "N/A";

  const groups = groupRoute(route);
  const currentStop = Number(progress.currentStop);

  const group = groups.find(g =>
    g.stops.some(stop => Number(stop.stopNumber) === currentStop)
  );

  if (!group) return `Stop ${currentStop}`;

  return `${group.placeName} (${group.precincts.join(", ")})`;
}

function getStatus(progress) {
  if (!progress || !progress.currentStop) {
    return `<span class="inactive">Not started</span>`;
  }

  if (progress.stopStatus === "nearby") {
    return `<span class="active">Nearby</span>`;
  }

  if (progress.stopStatus === "at_stop") {
    return `<span class="active">At location</span>`;
  }

  if (progress.stopStatus === "route_complete") {
    return `<span class="active">Route complete</span>`;
  }

  return `<span class="active">On the way</span>`;
}

async function loadDashboard() {
  try {
    const driversRes = await fetch("/drivers");
    const drivers = await driversRes.json();

    const locationsRes = await fetch("/locations");
    const locations = await locationsRes.json();

    const table = document.getElementById("tableBody");
    table.innerHTML = "";

    for (let i = 0; i < drivers.length; i++) {
      const driver = drivers[i];
      const color = getColor(i);

      const routeRes = await fetch(`/driver-route/${encodeURIComponent(driver)}`);
      const routeData = await routeRes.json();

      const route = routeData.route || [];
      const progress = routeData.progress || null;
      const location = locations.find(l => l.id === driver);

      const groups = groupRoute(route);
      const currentLocationText = getCurrentLocationText(route, progress);

      const completedPrecincts = getCompletedPrecinctCount(progress);
      const completedLocations = getCompletedLocationCount(route, progress);

      const row = document.createElement("tr");

      row.innerHTML = `
        <td>
          <div class="driver-name">
            <span class="driver-symbol" style="background:${color};"></span>
            <span>${driver}</span>
          </div>
        </td>
        <td>${currentLocationText}</td>
        <td>${getStatus(progress)}</td>
        <td>${location?.updatedAt ? new Date(location.updatedAt).toLocaleTimeString() : "No GPS"}</td>
        <td>${completedLocations} / ${groups.length}</td>
        <td>${completedPrecincts} / ${route.length}</td>
      `;

      table.appendChild(row);

      if (location) {
        const icon = createIcon(color);

        if (!markers[driver]) {
          markers[driver] = L.marker([location.lat, location.lon], { icon })
            .addTo(map)
            .bindPopup(`
              <b>${driver}</b><br>
              ${currentLocationText}<br>
              Locations: ${completedLocations} / ${groups.length}<br>
              Precincts: ${completedPrecincts} / ${route.length}<br>
              Last GPS: ${new Date(location.updatedAt).toLocaleTimeString()}
            `);
        } else {
          markers[driver].setLatLng([location.lat, location.lon]);
          markers[driver].setIcon(icon);
          markers[driver].setPopupContent(`
            <b>${driver}</b><br>
            ${currentLocationText}<br>
            Locations: ${completedLocations} / ${groups.length}<br>
            Precincts: ${completedPrecincts} / ${route.length}<br>
            Last GPS: ${new Date(location.updatedAt).toLocaleTimeString()}
          `);
        }
      }
    }

  } catch (err) {
    document.getElementById("tableBody").innerHTML =
      `<tr><td colspan="6">Error loading dashboard data</td></tr>`;
  }
}

setInterval(loadDashboard, 5000);
loadDashboard();
</script>

</body>
</html>
