<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Dispatch Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    h1 {
      padding: 16px;
      margin: 0;
    }

    #map {
      height: 420px;
      margin: 16px;
      border-radius: 10px;
    }

    table {
      width: calc(100% - 32px);
      margin: 16px;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 14px;
      border-bottom: 1px solid #eee;
      text-align: left;
      vertical-align: middle;
    }

    th {
      background: #eee;
    }

    .driver-name {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .driver-symbol {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid white;
      box-shadow: 0 0 4px rgba(0,0,0,0.5);
    }

    .marker {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 3px solid white;
      box-shadow: 0 0 6px rgba(0,0,0,0.6);
    }

    .active {
      color: green;
      font-weight: bold;
    }

    .inactive {
      color: red;
      font-weight: bold;
    }

    .progress-wrap {
      width: 180px;
      cursor: pointer;
    }

    .progress-label {
      font-size: 13px;
      margin-bottom: 5px;
      font-weight: bold;
      text-decoration: underline;
    }

    .progress-bar-bg {
      width: 100%;
      height: 12px;
      background: #e5e5e5;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: #198754;
      border-radius: 999px;
      transition: width 0.3s ease;
    }

    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal {
      background: white;
      max-width: 650px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 6px 22px rgba(0,0,0,0.25);
    }

    .modal h2 {
      margin-top: 0;
    }

    .modal-section {
      margin-top: 18px;
    }

    .modal-item {
      padding: 10px;
      border-bottom: 1px solid #eee;
      line-height: 1.4;
    }

    .modal-item:last-child {
      border-bottom: none;
    }

    .close-btn {
      background: #6c757d;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      margin-top: 18px;
      font-size: 16px;
    }

    .empty {
      color: #666;
      font-style: italic;
      padding: 8px 0;
    }
  </style>
</head>
<body>

<h1>Dispatch Dashboard</h1>

<div id="map"></div>

<table>
  <thead>
    <tr>
      <th>Driver</th>
      <th>Current Stop</th>
      <th>Status</th>
      <th>Last GPS</th>
      <th>Stops</th>
      <th>Progress</th>
    </tr>
  </thead>
  <tbody id="tableBody">
    <tr><td colspan="6">Loading...</td></tr>
  </tbody>
</table>

<div id="modalBackdrop" class="modal-backdrop" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h2 id="modalTitle">Driver Details</h2>
    <div id="modalContent"></div>
    <button class="close-btn" onclick="hideModal()">Close</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map("map").setView([39.9526, -75.1652], 11);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "&copy; OpenStreetMap contributors"
}).addTo(map);

let markers = {};
let dashboardData = [];

const colors = [
  "#0d6efd", "#198754", "#dc3545", "#fd7e14", "#6f42c1",
  "#20c997", "#d63384", "#ffc107", "#0dcaf0", "#6610f2"
];

function getColor(i) {
  return colors[i % colors.length];
}

function createIcon(color) {
  return L.divIcon({
    html: `<div class="marker" style="background:${color};"></div>`,
    className: "",
    iconSize: [30, 30],
    iconAnchor: [15, 15]
  });
}

function getCompletedCount(progress) {
  if (!progress || !Array.isArray(progress.completedStops)) {
    return 0;
  }

  return progress.completedStops.length;
}

function getProgressPercent(progress, route) {
  const completed = getCompletedCount(progress);
  const total = route.length || 0;

  if (total === 0) return 0;

  return Math.round((completed / total) * 100);
}

function getProgressBar(driverId, progress, route) {
  const completed = getCompletedCount(progress);
  const total = route.length || 0;
  const percent = getProgressPercent(progress, route);

  return `
    <div class="progress-wrap" onclick="showDriverDetails('${driverId.replace(/'/g, "\\'")}')">
      <div class="progress-label">${completed} / ${total} completed</div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" style="width:${percent}%"></div>
      </div>
    </div>
  `;
}

function getCurrentStopText(route, progress) {
  if (!progress || !progress.currentStop) {
    return "N/A";
  }

  const stopNum = Number(progress.currentStop);
  const stop = route.find(s => Number(s.stopNumber) === stopNum);

  if (!stop) {
    return `Stop ${stopNum}`;
  }

  return `${stop.precinct} - ${stop.placeName}`;
}

function getStatus(progress) {
  if (!progress || !progress.currentStop) {
    return `<span class="inactive">Not started</span>`;
  }

  return `<span class="active">On the way</span>`;
}

function stopLabel(stop) {
  return `${stop.precinct} - ${stop.placeName}`;
}

function showDriverDetails(driverId) {
  const driver = dashboardData.find(d => d.driverId === driverId);
  if (!driver) return;

  const route = driver.route || [];
  const progress = driver.progress || {};
  const completedStops = Array.isArray(progress.completedStops)
    ? progress.completedStops.map(Number)
    : [];
  const reopenedStops = Array.isArray(progress.reopenedStops)
    ? progress.reopenedStops.map(Number)
    : [];
  const currentStopNumber = progress.currentStop ? Number(progress.currentStop) : null;

  const completedItems = route.filter(stop =>
    completedStops.includes(Number(stop.stopNumber))
  );

  const reopenedItems = route.filter(stop =>
    reopenedStops.includes(Number(stop.stopNumber))
  );

  const currentItem = route.find(stop =>
    Number(stop.stopNumber) === currentStopNumber
  );

  const todoItems = route.filter(stop =>
    Number(stop.stopNumber) !== currentStopNumber &&
    !completedStops.includes(Number(stop.stopNumber)) &&
    !reopenedStops.includes(Number(stop.stopNumber))
  );

  const modalTitle = document.getElementById("modalTitle");
  const modalContent = document.getElementById("modalContent");

  modalTitle.innerText = `${driver.driverId} Route Details`;

  let html = `
    <div><strong>Progress:</strong> ${completedItems.length} / ${route.length} completed</div>
    <div><strong>Current Stop:</strong> ${currentItem ? stopLabel(currentItem) : "N/A"}</div>
  `;

  html += `<div class="modal-section"><h3>Completed Precincts</h3>`;
  if (completedItems.length) {
    completedItems.forEach(stop => {
      html += `
        <div class="modal-item">
          <strong>${stop.precinct}</strong> - ${stop.placeName}<br>
          Stop ${stop.stopNumber} | ${stop.streetAddress}
        </div>
      `;
    });
  } else {
    html += `<div class="empty">No completed precincts yet.</div>`;
  }
  html += `</div>`;

  html += `<div class="modal-section"><h3>Reopened / Returned to End</h3>`;
  if (reopenedItems.length) {
    reopenedItems.forEach(stop => {
      html += `
        <div class="modal-item">
          <strong>${stop.precinct}</strong> - ${stop.placeName}<br>
          Stop ${stop.stopNumber} | ${stop.streetAddress}
        </div>
      `;
    });
  } else {
    html += `<div class="empty">No reopened stops.</div>`;
  }
  html += `</div>`;

  html += `<div class="modal-section"><h3>Remaining To Do</h3>`;
  if (todoItems.length) {
    todoItems.forEach(stop => {
      html += `
        <div class="modal-item">
          <strong>${stop.precinct}</strong> - ${stop.placeName}<br>
          Stop ${stop.stopNumber} | ${stop.streetAddress}
        </div>
      `;
    });
  } else {
    html += `<div class="empty">No remaining standard stops.</div>`;
  }
  html += `</div>`;

  modalContent.innerHTML = html;
  document.getElementById("modalBackdrop").style.display = "flex";
}

function hideModal() {
  document.getElementById("modalBackdrop").style.display = "none";
}

function closeModal(event) {
  if (event.target.id === "modalBackdrop") {
    hideModal();
  }
}

async function loadDashboard() {
  try {
    const driversRes = await fetch("/drivers");
    const drivers = await driversRes.json();

    const locationsRes = await fetch("/locations");
    const locations = await locationsRes.json();

    const table = document.getElementById("tableBody");
    table.innerHTML = "";
    dashboardData = [];

    for (let i = 0; i < drivers.length; i++) {
      const driver = drivers[i];
      const color = getColor(i);

      const routeRes = await fetch(`/driver-route/${encodeURIComponent(driver)}`);
      const routeData = await routeRes.json();

      const route = routeData.route || [];
      const progress = routeData.progress || null;
      const location = locations.find(l => l.id === driver);

      dashboardData.push({
        driverId: driver,
        route,
        progress,
        location
      });

      const currentStopText = getCurrentStopText(route, progress);
      const completed = getCompletedCount(progress);

      const row = document.createElement("tr");

      row.innerHTML = `
        <td>
          <div class="driver-name">
            <span class="driver-symbol" style="background:${color};"></span>
            <span>${driver}</span>
          </div>
        </td>
        <td>${currentStopText}</td>
        <td>${getStatus(progress)}</td>
        <td>${location?.updatedAt ? new Date(location.updatedAt).toLocaleTimeString() : "No GPS"}</td>
        <td>${completed} / ${route.length}</td>
        <td>${getProgressBar(driver, progress, route)}</td>
      `;

      table.appendChild(row);

      if (location) {
        const icon = createIcon(color);

        if (!markers[driver]) {
          markers[driver] = L.marker([location.lat, location.lon], { icon })
            .addTo(map)
            .bindPopup(`
              <b>${driver}</b><br>
              ${currentStopText}<br>
              Stops: ${completed} / ${route.length}<br>
              Last GPS: ${new Date(location.updatedAt).toLocaleTimeString()}
            `);
        } else {
          markers[driver].setLatLng([location.lat, location.lon]);
          markers[driver].setIcon(icon);
          markers[driver].setPopupContent(`
            <b>${driver}</b><br>
            ${currentStopText}<br>
            Stops: ${completed} / ${route.length}<br>
            Last GPS: ${new Date(location.updatedAt).toLocaleTimeString()}
          `);
        }
      }
    }

  } catch (err) {
    document.getElementById("tableBody").innerHTML =
      `<tr><td colspan="6">Error loading dashboard data</td></tr>`;
  }
}

setInterval(loadDashboard, 5000);
loadDashboard();
</script>

</body>
</html>
