<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Precinct Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #222;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .title {
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
    }

    .status-banner {
      font-size: 22px;
      font-weight: bold;
      text-align: center;
      padding: 16px;
      border-radius: 14px;
      margin-bottom: 14px;
    }

    .status-red {
      background: #f8d7da;
      color: #842029;
    }

    .status-yellow {
      background: #fff3cd;
      color: #664d03;
    }

    .status-green {
      background: #d1e7dd;
      color: #0f5132;
    }

    .status-blue {
      background: #cfe2ff;
      color: #084298;
    }

    .label {
      font-weight: bold;
    }

    .info-row {
      margin-bottom: 8px;
      line-height: 1.5;
    }

    #map {
      height: 420px;
      width: 100%;
      border-radius: 14px;
    }

    .error {
      color: #b00020;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="card">
      <div class="title">Precinct Tracker</div>
      <div class="subtitle">Live delivery status for your assigned driver</div>
    </div>

    <div id="statusBanner" class="status-banner status-blue">
      Loading status...
    </div>

    <div class="card" id="info">
      Loading precinct information...
    </div>

    <div class="card">
      <div id="map"></div>
    </div>

  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const precinct = params.get("precinct");

    const info = document.getElementById("info");
    const banner = document.getElementById("statusBanner");

    if (!precinct) {
      info.innerHTML = '<div class="error">Missing precinct in URL.</div>';
      throw new Error("Missing precinct");
    }

    const map = L.map("map").setView([39.9526, -75.1652], 12);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    let marker = null;
    let firstLoad = true;

    function formatTime(isoString) {
      if (!isoString) return "Unknown";
      return new Date(isoString).toLocaleString();
    }

    function getStatus(progress, stopsBeforeYou, driverAtYourStop, hasLocation) {
      if (!hasLocation) {
        return ["Waiting for driver location", "status-blue"];
      }

      if (driverAtYourStop) {
        return ["Driver has arrived at your stop", "status-green"];
      }

      if (!progress) {
        return ["Driver has not started the route yet", "status-red"];
      }

      if (stopsBeforeYou === 0) {
        return ["Driver is at or past your stop", "status-green"];
      }

      if (stopsBeforeYou === 1) {
        return ["Driver is 1 stop away", "status-green"];
      }

      if (stopsBeforeYou <= 3) {
        return [`Driver is ${stopsBeforeYou} stops away`, "status-yellow"];
      }

      return [`Driver is ${stopsBeforeYou} stops away`, "status-red"];
    }

    async function loadPrecinct() {
      try {
        const res = await fetch(`/assignment/${encodeURIComponent(precinct)}`);

        if (!res.ok) {
          throw new Error("Precinct not found");
        }

        const data = await res.json();
        const assignment = data.assignment;
        const driverLocation = data.driverLocation;
        const progress = data.progress;
        const stopsBeforeYou = data.stopsBeforeYou;
        const driverAtYourStop = data.driverAtYourStop;

        const [statusText, statusClass] = getStatus(
          progress,
          stopsBeforeYou,
          driverAtYourStop,
          !!driverLocation
        );

        banner.className = `status-banner ${statusClass}`;
        banner.innerText = statusText;

        let html = `
          <div class="info-row"><span class="label">Precinct:</span> ${assignment.precinct}</div>
          <div class="info-row"><span class="label">Assigned Driver:</span> ${assignment.driverId}</div>
          <div class="info-row"><span class="label">Stop Number:</span> ${assignment.stopNumber}</div>
          <div class="info-row"><span class="label">Location:</span> ${assignment.placeName}</div>
          <div class="info-row"><span class="label">Address:</span> ${assignment.streetAddress}</div>
        `;

        if (progress) {
          html += `
            <div class="info-row"><span class="label">Driver Current Stop:</span> ${progress.currentStop}</div>
            <div class="info-row"><span class="label">Stops Before You:</span> ${stopsBeforeYou}</div>
            <div class="info-row"><span class="label">Progress Updated:</span> ${formatTime(progress.updatedAt)}</div>
          `;
        } else {
          html += `
            <div class="info-row"><span class="label">Driver Current Stop:</span> Not started yet</div>
          `;
        }

        if (driverAtYourStop) {
          html += `
            <div class="info-row"><span class="label">Arrival Status:</span> Driver has arrived</div>
          `;
        }

        if (driverLocation) {
          html += `
            <div class="info-row"><span class="label">Driver Last GPS Update:</span> ${formatTime(driverLocation.updatedAt)}</div>
          `;
        } else {
          html += `
            <div class="info-row"><span class="label">Driver GPS:</span> Waiting for driver location</div>
          `;
        }

        info.innerHTML = html;

        if (driverLocation) {
          const lat = driverLocation.lat;
          const lon = driverLocation.lon;

          if (!marker) {
            marker = L.marker([lat, lon]).addTo(map);
            marker.bindPopup(`Driver: ${assignment.driverId}`);
          } else {
            marker.setLatLng([lat, lon]);
          }

          if (firstLoad) {
            map.setView([lat, lon], 14);
            firstLoad = false;
          }
        }
      } catch (err) {
        banner.className = "status-banner status-red";
        banner.innerText = "Unable to load precinct data";
        info.innerHTML = `<div class="error">Unable to load precinct data.</div>`;
      }
    }

    loadPrecinct();
    setInterval(loadPrecinct, 5000);
  </script>
</body>
</html>
