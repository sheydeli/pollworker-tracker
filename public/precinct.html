<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Precinct Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #222;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .title {
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .status-banner {
      font-size: 22px;
      font-weight: bold;
      text-align: center;
      padding: 16px;
      border-radius: 14px;
      margin-bottom: 14px;
    }

    .status-red {
      background: #f8d7da;
      color: #842029;
    }

    .status-yellow {
      background: #fff3cd;
      color: #664d03;
    }

    .status-green {
      background: #d1e7dd;
      color: #0f5132;
    }

    .status-blue {
      background: #cfe2ff;
      color: #084298;
    }

    .label {
      font-weight: bold;
    }

    #map {
      height: 420px;
      width: 100%;
      border-radius: 14px;
      overflow: hidden;
    }

    .error {
      color: #b00020;
      font-weight: bold;
    }

    .small {
      color: #666;
      font-size: 14px;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="title">Precinct Tracker</div>
      <div class="small">Live delivery view for your assigned driver</div>
    </div>

    <div id="statusBanner" class="status-banner status-blue">
      Loading status...
    </div>

    <div class="card" id="info">
      Loading precinct information...
    </div>

    <div class="card">
      <div id="map"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const precinct = params.get("precinct");
    const info = document.getElementById("info");
    const statusBanner = document.getElementById("statusBanner");

    if (!precinct) {
      info.innerHTML = '<span class="error">Missing precinct in URL.</span>';
      throw new Error("Missing precinct");
    }

    const map = L.map("map").setView([39.9526, -75.1652], 12);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    let driverMarker = null;
    let firstLoad = true;

    function formatTime(isoString) {
      if (!isoString) return "Unknown";
      return new Date(isoString).toLocaleString();
    }

    function getStatusText(progress, stopsBeforeYou, driverLocation, driverAtYourStop) {
      if (!driverLocation) {
        return {
          text: "Waiting for driver location",
          className: "status-blue"
        };
      }

      if (driverAtYourStop) {
        return {
          text: "Driver has arrived at your stop",
          className: "status-green"
        };
      }

      if (!progress) {
        return {
          text: "Driver has not started the route yet",
          className: "status-red"
        };
      }

      if (stopsBeforeYou === 0) {
        return {
          text: "Driver is at or past your stop",
          className: "status-green"
        };
      }

      if (stopsBeforeYou === 1) {
        return {
          text: "Driver is 1 stop away",
          className: "status-green"
        };
      }

      if (stopsBeforeYou <= 3) {
        return {
          text: `Driver is ${stopsBeforeYou} stops away`,
          className: "status-yellow"
        };
      }

      return {
        text: `Driver is ${stopsBeforeYou} stops away`,
        className: "status-red"
      };
    }

    async function loadPrecinct() {
      try {
        const res = await fetch(`/assignment/${encodeURIComponent(precinct)}`);

        if (!res.ok) {
          throw new Error("Precinct not found");
        }

        const data = await res.json();
        const assignment = data.assignment;
        const driverLocation = data.driverLocation;
        const progress = data.progress;
        const stopsBeforeYou = data.stopsBeforeYou;
        const driverAtYourStop = data.driverAtYourStop;

        const status = getStatusText(progress, stopsBeforeYou, driverLocation, driverAtYourStop);
        statusBanner.className = `status-banner ${status.className}`;
        statusBanner.innerText = status.text;

        let html = `
          <div><span class="label">Precinct:</span> ${assignment.precinct}</div>
          <div><span class="label">Assigned Driver:</span> ${assignment.driverId}</div>
          <div><span class="label">Stop Number:</span> ${assignment.stopNumber}</div>
          <div><span class="label">Location:</span> ${assignment.placeName}</div>
          <div><span class="label">Address:</span> ${assignment.streetAddress}</div>
        `;

        if (progress) {
          html += `
            <div><span class="label">Driver Current Stop:</span> ${progress.currentStop}</div>
            <div><span class="label">Stops Before You:</span> ${stopsBeforeYou}</div>
            <div><span class="label">Progress Updated:</span> ${formatTime(progress.updatedAt)}</div>
          `;
        } else {
          html += `
            <div><span class="label">Driver Current Stop:</span> Not started yet</div>
          `;
        }

        if (driverAtYourStop) {
          html += `
            <div><span class="label">Arrival Status:</span> Driver has arrived</div>
          `;
        }

        if (driverLocation) {
          html += `
            <div><span class="label">Driver Last GPS Update:</span> ${formatTime(driverLocation.updatedAt)}</div>
          `;
        } else {
          html += `
            <div><span class="label">Driver GPS:</span> Waiting for driver location</div>
          `;
        }

        info.innerHTML = html;

        if (driverLocation) {
          const lat = driverLocation.lat;
          const lon = driverLocation.lon;

          if (!driverMarker) {
            driverMarker = L.marker([lat, lon]).addTo(map);
            driverMarker.bindPopup(`Driver: ${assignment.driverId}`).openPopup();
          } else {
            driverMarker.setLatLng([lat, lon]);
          }

          if (firstLoad) {
            map.setView([lat, lon], 14);
            firstLoad = false;
          }
        }
      } catch (err) {
        statusBanner.className = "status-banner status-red";
        statusBanner.innerText = "Unable to load precinct data";
        info.innerHTML = `<span class="error">Unable to load precinct data.</span>`;
      }
    }

    loadPrecinct();
    setInterval(loadPrecinct, 5000);
  </script>
</body>
</html>
