<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Precinct Tracker</title>
</head>
<body>

<h2>Precinct Tracker</h2>
<div id="info"></div>

<script>
const params = new URLSearchParams(window.location.search);
const precinct = params.get("precinct");

async function load() {
  const res = await fetch(`/assignment/${precinct}`);
  const data = await res.json();

  let status = "";

  if (data.statusCode === "on_the_way") {
    status = `Driver is on the way (${data.stopsBeforeYou} stops away)`;
  } else if (data.statusCode === "completed_or_return") {
    status = "Driver Completed Collection or Will Return";
  } else {
    status = "Driver not started";
  }

  document.getElementById("info").innerHTML = `
    Precinct: ${data.assignment.precinct}<br>
    Driver: ${data.assignment.driverId}<br>
    Stop: ${data.assignment.stopNumber}<br>
    Status: ${status}<br>
    ETA: ${data.etaMinutes ? data.etaMinutes + " min" : "N/A"}
  `;
}

setInterval(load, 3000);
load();
</script>

</body>
</html>
