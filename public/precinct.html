<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>
<body>

<div id="info"></div>
<div id="map" style="height:80vh;"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const p=new URLSearchParams(location.search).get("precinct");

const map=L.map('map').setView([39.95,-75.16],12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let marker;

async function load(){
 const res=await fetch(`/assignment/${p}`);
 const d=await res.json();

 info.innerHTML=`
 Precinct: ${d.assignment.precinct}<br>
 Driver: ${d.assignment.driverId}<br>
 Stop: ${d.assignment.stopNumber}<br>
 Stops Before You: ${d.stopsBeforeYou}
 `;

 if(d.driverLocation){
  const lat=d.driverLocation.lat;
  const lon=d.driverLocation.lon;

  if(!marker){
    marker=L.marker([lat,lon]).addTo(map);
  } else {
    marker.setLatLng([lat,lon]);
  }
 }
}

setInterval(load,5000);
load();
</script>

</body>
</html>
